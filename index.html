<script>
const btn = document.getElementById("runaway");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;
let vx = 0;
let vy = 0;

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function runAway(clientX, clientY) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const dx = cx - clientX;
  const dy = cy - clientY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 220 && dist > 0) {
    const force = (220 - dist) / 20;
    vx += (dx / dist) * force;
    vy += (dy / dist) * force;
  }
}

document.addEventListener("pointermove", (e) => {
  runAway(e.clientX, e.clientY);
});

document.addEventListener("pointerdown", (e) => {
  if (e.pointerType === "touch") {
    runAway(e.clientX, e.clientY);
  }
});

function animate() {
  const rect = btn.getBoundingClientRect();

  vx *= 0.85;
  vy *= 0.85;

  x += vx;
  y += vy;

  const margin = 20;

  if (x <= margin || x >= window.innerWidth - rect.width - margin) {
    vx *= -1;
    x = clamp(x, margin, window.innerWidth - rect.width - margin);
  }

  if (y <= margin || y >= window.innerHeight - rect.height - margin) {
    vy *= -1;
    y = clamp(y, margin, window.innerHeight - rect.height - margin);
  }

  btn.style.left = x + "px";
  btn.style.top = y + "px";
  btn.style.transform = "none";

  requestAnimationFrame(animate);
}

animate();
</script>
