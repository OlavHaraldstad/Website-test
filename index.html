<!DOCTYPE html>
<html>
<head>
    <title>Olav's nettside</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
        }

        #runaway {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<h1>Hallo</h1>

<button id="runaway">Trykk meg</button>

<script>
    const btn = document.getElementById("runaway");

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    document.addEventListener("mousemove", (e) => {
        const rect = btn.getBoundingClientRect();

        const btnX = rect.left + rect.width / 2;
        const btnY = rect.top + rect.height / 2;

        const dx = btnX - e.clientX;
        const dy = btnY - e.clientY;

        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < 200) {
            const speed = (200 - distance) / 8;

            x += (dx / distance) * speed;
            y += (dy / distance) * speed;

            const margin = 10;

            x = Math.max(margin, Math.min(window.innerWidth - rect.width - margin, x));
            y = Math.max(margin, Math.min(window.innerHeight - rect.height - margin, y));

            btn.style.left = x + "px";
            btn.style.top = y + "px";
            btn.style.transform = "none";
        }
    });
</script>

</body>
</html>
